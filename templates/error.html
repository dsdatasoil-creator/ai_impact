{% extends "base.html" %}

{% block title %}Error - AI Impact Dashboard{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h4><i class="fas fa-exclamation-triangle me-2"></i>Error</h4>
            </div>
            <div class="card-body text-center">
                <i class="fas fa-bug fa-4x text-danger mb-4"></i>
                <h5 class="card-title">Something went wrong</h5>
                <p class="card-text text-muted">{{ error }}</p>
                <div class="mt-4">
                    <a href="/" class="btn btn-primary">
                        <i class="fas fa-home me-2"></i>Go to Homepage
                    </a>
                    <a href="/tasks" class="btn btn-outline-secondary ms-2">
                        <i class="fas fa-tasks me-2"></i>View Tasks
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
